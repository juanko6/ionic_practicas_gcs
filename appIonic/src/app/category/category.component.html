<ion-item button (click)="click()" detail="false">
  <ion-avatar slot="start">
    <img [src]="'../../assets/images/categories/' + theCategory.image" />
  </ion-avatar>
  <ion-label>
    <h2>{{ theCategory.name }}</h2>
  </ion-label>
  <ion-button slot="end" fill="clear" (click)="click(); $event.stopPropagation()">
    <ion-icon slot="icon-only" name="eye"></ion-icon>
  </ion-button>
</ion-item>

<ion-list *ngIf="selected" class="article-list">
  <ion-item
    *ngFor="let article of articles"
    button
    detail="true"
    lines="inset"
    [href]="generateURL(theCategory.name, article.uid)"
  >
    <ion-label>{{ article.name }}</ion-label>
  </ion-item>
</ion-list>
