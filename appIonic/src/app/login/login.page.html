<ion-header>
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <form [formGroup]="formLogin" novalidate>
    <ion-list>
      <ion-item>
        <ion-label position="stacked">Email</ion-label>
        <ion-input
          type="email"
          formControlName="email"
          placeholder="usuario@dominio.com"
          autocomplete="email"
        ></ion-input>
      </ion-item>
      <p
        ion-text
        color="danger"
        *ngIf="formLogin.controls.email.touched && formLogin.controls.email.invalid"
        class="error-text"
      >
        <span *ngIf="formLogin.controls.email.hasError('required')">
          El email es obligatorio.
        </span>
        <span *ngIf="formLogin.controls.email.hasError('email')">
          Formato de email no válido.
        </span>
      </p>

      <ion-item>
        <ion-label position="stacked">Contraseña</ion-label>
        <ion-input
          type="password"
          formControlName="password"
          autocomplete="current-password"
        ></ion-input>
      </ion-item>
      <p
        ion-text
        color="danger"
        *ngIf="formLogin.controls.password.touched && formLogin.controls.password.invalid"
        class="error-text"
      >
        <span *ngIf="formLogin.controls.password.hasError('required')">
          La contraseña es obligatoria.
        </span>
        <span *ngIf="formLogin.controls.password.hasError('minlength')">
          Mínimo 6 caracteres.
        </span>
      </p>
    </ion-list>

    <div class="form-actions">
      <ion-button
        expand="block"
        type="button"
        (click)="doLogin()"
        [disabled]="!formLogin.valid"
      >
        Entrar
      </ion-button>
    </div>
  </form>

  <!-- Alert de credenciales incorrectas. Se abre cuando `error` tiene
       contenido y se cierra vaciándolo desde `dismissError()`. -->
  <ion-alert
    [isOpen]="!!error"
    header="Login incorrecto"
    [message]="error"
    [buttons]="[{ text: 'OK', handler: dismissError.bind(this) }]"
    (didDismiss)="dismissError()"
  ></ion-alert>
</ion-content>
